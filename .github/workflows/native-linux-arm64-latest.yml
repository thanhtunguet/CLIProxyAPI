name: Native Linux ARM64 (latest release)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: native-linux-arm64-latest
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: arm64
        run: |
          short_commit=$(git rev-parse --short HEAD)
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build -trimpath \
            -ldflags="-s -w -X 'main.Version=latest' -X 'main.Commit=${short_commit}' -X 'main.BuildDate=${build_date}'" \
            -o cli-proxy-api-linux-arm64 \
            ./cmd/server

      - name: Point latest tag at current commit and attach binary to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa latest -m "Rolling latest (linux/arm64 CI build)"
          git push origin "refs/tags/latest" --force

          artifact="cli-proxy-api-linux-arm64"
          if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload latest "${artifact}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
            gh release create latest "${artifact}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "latest" \
              --notes "Rolling **linux/arm64** build from [\`${GITHUB_SHA:0:7}\`](${commit_url}). Versioned builds are published from git tags via GoReleaser." \
              --latest
          fi
