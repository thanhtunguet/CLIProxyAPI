name: Native Linux (latest release)

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: native-linux-latest
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build linux/amd64 and linux/arm64
        env:
          CGO_ENABLED: "0"
          GOOS: linux
        run: |
          set -euo pipefail
          short_commit=$(git rev-parse --short HEAD)
          build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          ldflags="-s -w -X 'main.Version=latest' -X 'main.Commit=${short_commit}' -X 'main.BuildDate=${build_date}'"
          for goarch in amd64 arm64; do
            GOARCH="${goarch}" go build -trimpath \
              -ldflags="${ldflags}" \
              -o "cli-proxy-api-linux-${goarch}" \
              ./cmd/server
          done

      - name: Point latest tag at current commit and attach binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa latest -m "Rolling latest (linux amd64/arm64 CI build)"
          git push origin "refs/tags/latest" --force

          artifacts=(cli-proxy-api-linux-amd64 cli-proxy-api-linux-arm64)
          if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload latest "${artifacts[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
          else
            commit_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${GITHUB_SHA}"
            gh release create latest "${artifacts[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "latest" \
              --notes "Rolling **linux/amd64** and **linux/arm64** builds from [\`${GITHUB_SHA:0:7}\`](${commit_url}). Versioned builds are published from git tags via GoReleaser." \
              --latest
          fi
